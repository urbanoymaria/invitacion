<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <script>
    // ========= DETECCIÓN iPHONE / iPAD =========
    const isIOSDevice = document.documentElement.classList.contains("is-ios");

    // ========= ALTURA REAL EN MÓVILES =========
    function setRealViewportHeight() {
      document.documentElement.style.setProperty("--vh", `${window.innerHeight * 0.01}px`);
    }

    setRealViewportHeight();
    window.addEventListener("resize", setRealViewportHeight);
    window.addEventListener("orientationchange", () => {
      setTimeout(setRealViewportHeight, 300);
    });

    // ========= INTRO SOBRE =========
    const intro = document.getElementById("intro");
    const introVideo = document.getElementById("introVideo");
    const app = document.getElementById("app");

    let started = false;
    let introFallbackTimer = null;
    let lastIntroStartAt = 0;

    // ========= HINT PORTADA 15 SEGUNDOS =========
    const invHintHome = document.querySelector(".invHintHome");
    let invHintTimer = null;

    function showHomeHintFor15Seconds() {
      if (!invHintHome) return;

      clearTimeout(invHintTimer);
      invHintHome.classList.remove("is-hidden");

      invHintTimer = setTimeout(() => {
        invHintHome.classList.add("is-hidden");
      }, 15000);
    }

    function showApp(){
      clearTimeout(introFallbackTimer);

      if (intro) {
        intro.style.display = "none";
        intro.classList.remove("fadeOut");
        intro.classList.remove("is-playing");
      }

      if (app) {
        app.classList.add("show");
        app.setAttribute("aria-hidden", "false");
      }

      setRealViewportHeight();
      window.scrollTo(0,0);
      showHomeHintFor15Seconds();
    }

    function showIntro(){
      clearTimeout(introFallbackTimer);
      clearTimeout(invHintTimer);

      if (app) {
        app.classList.remove("show");
        app.setAttribute("aria-hidden", "true");
      }

      if (intro) {
        intro.style.display = "block";
        intro.classList.remove("fadeOut");
        intro.classList.remove("is-playing");
      }

      started = false;

      if (invHintHome) invHintHome.classList.remove("is-hidden");

      try{
        introVideo.pause();
        introVideo.currentTime = 0;
      }catch(e){}
    }

    async function startIntro(e){
      if (e) {
        e.preventDefault();
        e.stopPropagation();
      }

      // Evita doble ejecución en iPhone por touch + click
      const now = Date.now();
      if (now - lastIntroStartAt < 450) return;
      lastIntroStartAt = now;

      if (started) return;
      started = true;

      if (intro) intro.classList.add("is-playing");
      clearTimeout(introFallbackTimer);

      // Fallback por si iPhone/Safari no lanza ended o el vídeo falla.
      const duration = introVideo && Number.isFinite(introVideo.duration) && introVideo.duration > 0
        ? introVideo.duration
        : 7;

      introFallbackTimer = setTimeout(() => {
        if (intro) intro.classList.add("fadeOut");
        setTimeout(showApp, 520);
      }, Math.min((duration + 1) * 1000, 11000));

      try {
        if (introVideo) {
          introVideo.muted = true;
          introVideo.setAttribute("muted", "");
          introVideo.setAttribute("playsinline", "");
          introVideo.setAttribute("webkit-playsinline", "");
          introVideo.currentTime = 0;
          await introVideo.play();
        } else {
          showApp();
        }
      } catch (e) {
        if (intro) intro.classList.add("fadeOut");
        setTimeout(showApp, 520);
      }
    }

    if (intro && introVideo) {
      intro.addEventListener("click", startIntro, { passive: false });
      intro.addEventListener("touchend", startIntro, { passive: false });

      introVideo.addEventListener("ended", () => {
        clearTimeout(introFallbackTimer);
        intro.classList.add("fadeOut");
        setTimeout(showApp, 520);
      });

      introVideo.addEventListener("error", () => {
        clearTimeout(introFallbackTimer);
        intro.classList.add("fadeOut");
        setTimeout(showApp, 520);
      });
    }

    // ========= MENÚ =========
    const menuBtn = document.getElementById("menuBtn");
    const closeBtn = document.getElementById("closeBtn");
    const menuOverlay = document.getElementById("menuOverlay");

    if (menuBtn && menuOverlay) {
      menuBtn.addEventListener("click", () => menuOverlay.classList.add("show"));
    }

    if (closeBtn && menuOverlay) {
      closeBtn.addEventListener("click", () => menuOverlay.classList.remove("show"));
    }

    if (menuOverlay) {
      menuOverlay.addEventListener("click", (e) => {
        if (e.target === menuOverlay) menuOverlay.classList.remove("show");
      });
    }

    // ========= PÁGINAS =========
    const pages = Array.from(document.querySelectorAll(".page"));
    let active = "inicio";

    function getPage(name){ return pages.find(p => p.dataset.page === name); }

    function setActive(target){
      if (!target || target === active) return;
      const current = getPage(active);
      const next = getPage(target);
      if (!current || !next) return;

      current.classList.remove("is-visible");
      setTimeout(() => {
        current.classList.remove("is-active");
        next.classList.add("is-active");
        requestAnimationFrame(() => next.classList.add("is-visible"));
        active = target;
        setRealViewportHeight();
        window.scrollTo(0,0);

        if (target === "inicio") {
          showHomeHintFor15Seconds();
        }
      }, 220);
    }

    document.querySelectorAll(".menuLink").forEach(btn => {
      btn.addEventListener("click", () => {
        if (menuOverlay) menuOverlay.classList.remove("show");
        setActive(btn.dataset.page);
      });
    });

    // ========= REPLAY =========
    const replayBtn = document.getElementById("replayBtn");
    if (replayBtn) {
      replayBtn.addEventListener("click", () => {
        if (menuOverlay) menuOverlay.classList.remove("show");
        showIntro();
      });
    }

    // ========= INVITACIÓN FULLSCREEN ROBUSTA iPHONE =========
    const openInv = document.getElementById("openInvFull");
    const invFull = document.getElementById("invFull");
    const invFullImg = document.getElementById("invFullImg");

    let lastOpenedFullAt = 0;

    function openFull(e){
      if (e) {
        e.preventDefault();
        e.stopPropagation();
      }

      if (!invFull) return;

      lastOpenedFullAt = Date.now();
      invFull.classList.add("show");
      invFull.setAttribute("aria-hidden", "false");
      setRealViewportHeight();
    }

    function closeFull(e){
      if (e) {
        e.preventDefault();
        e.stopPropagation();
      }

      // Evita que iPhone abra/cierre instantáneamente por doble evento
      if (Date.now() - lastOpenedFullAt < 450) return;
      if (!invFull) return;

      invFull.classList.remove("show");
      invFull.setAttribute("aria-hidden", "true");
    }

    if (openInv && invFull) {
      openInv.addEventListener("click", openFull, { passive: false });
      openInv.addEventListener("touchend", openFull, { passive: false });

      invFull.addEventListener("click", closeFull, { passive: false });
      invFull.addEventListener("touchend", closeFull, { passive: false });

      if (invFullImg) {
        invFullImg.addEventListener("click", closeFull, { passive: false });
        invFullImg.addEventListener("touchend", closeFull, { passive: false });
      }
    }

    // ========= SORPRESA =========
    const giftBtn = document.getElementById("giftBtn");
    const giftOverlay = document.getElementById("giftOverlay");

    if (giftBtn && giftOverlay) {
      giftBtn.addEventListener("click", (e) => {
        e.preventDefault();
        e.stopPropagation();
        giftOverlay.classList.add("show");
        giftOverlay.setAttribute("aria-hidden", "false");
      });

      giftOverlay.addEventListener("click", (e) => {
        e.preventDefault();
        e.stopPropagation();
        giftOverlay.classList.remove("show");
        giftOverlay.setAttribute("aria-hidden", "true");
      });
    }
  </script>

</body>
</html>
